<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legacy League</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <main id="auth-screen" hidden>
    <h1>Legacy League</h1>
    <form id="auth-form">
      <input id="username" name="username" placeholder="Username" autocomplete="username" required />
      <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
      <fieldset id="avatar-pick">
        <legend>Pick your animal (sign up)</legend>
        <label><input type="radio" name="avatar" value="dog" checked /><span class="ava-emoji">🐶</span> Dog</label>
        <label><input type="radio" name="avatar" value="cat" /><span class="ava-emoji">🐱</span> Cat</label>
        <label><input type="radio" name="avatar" value="capybara" /><span class="ava-emoji">🦫</span> Capybara</label>
      </fieldset>
      <div class="buttons">
        <button type="submit" name="action" value="login">Log in</button>
        <button type="submit" name="action" value="signup">Sign up</button>
      </div>
      <p id="auth-msg" role="alert"></p>
    </form>
  </main>

  <section id="game-screen" hidden>
    <header>
      <span>Welcome, <strong id="whoami"></strong></span>
      <button id="logout">Log out</button>
    </header>

    <div class="layout">
      <div id="world">
        <canvas id="world-canvas"></canvas>
      </div>
      <aside id="chat-panel"></aside>
    </div>

    <div id="overlay" hidden>
      <div id="overlay-content"></div>
    </div>
  </section>

  <script type="module" src="src/main.js"></script>
</body>
</html>
