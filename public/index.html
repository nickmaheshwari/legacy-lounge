<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legacy League</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🃏</text></svg>" />
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="err-banner" hidden></div>
  <main id="auth-screen" hidden>
    <div class="auth-suits" aria-hidden="true">
      <span>♠</span><span>♥</span><span>♦</span><span>♣</span><span>♠</span><span>♥</span><span>♦</span><span>♣</span>
    </div>
    <div class="auth-card">
      <div class="auth-emblem" aria-hidden="true">♠</div>
      <h1>Legacy League</h1>
      <p class="auth-sub">A members-only social club &amp; casino</p>
      <div class="auth-tabs">
        <button type="button" id="tab-login" class="active">Log in</button>
        <button type="button" id="tab-signup">Sign up</button>
      </div>
      <form id="auth-form">
        <input id="username" name="username" placeholder="Username" autocomplete="username" required />
        <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
        <fieldset id="avatar-pick" hidden>
          <legend>Pick your animal</legend>
          <div id="signup-avatars" class="avatar-grid"></div>
        </fieldset>
        <button type="submit" id="auth-submit">Log in</button>
        <p id="auth-msg" role="alert"></p>
      </form>
    </div>
  </main>

  <section id="game-screen" hidden>
    <header>
      <span>Welcome, <strong id="whoami"></strong> &nbsp;·&nbsp; <strong id="cash">$0</strong></span>
      <div class="header-actions">
        <button id="profile-btn">⚙ Profile</button>
        <button id="logout">Log out</button>
      </div>
    </header>

    <div class="layout">
      <div id="world">
        <canvas id="world-canvas"></canvas>
      </div>
      <aside id="chat-panel"></aside>
    </div>

    <div id="overlay" hidden>
      <div id="overlay-content"></div>
    </div>

    <div id="profile-modal" hidden>
      <div class="modal-card">
        <h2>Profile</h2>
        <label class="profile-field">Username
          <input id="profile-username" autocomplete="off" />
        </label>
        <fieldset>
          <legend>Avatar</legend>
          <div id="profile-avatars" class="avatar-grid"></div>
        </fieldset>
        <p id="profile-msg" role="alert"></p>
        <div class="casino-controls">
          <button type="button" id="profile-save">Save</button>
          <button type="button" id="profile-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </section>

  <script type="module" src="src/main.js"></script>
</body>
</html>
